<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhargavi Lakshmi & Krishna Sai - Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-fade-speed: 0.8s; /* Sets the speed of the image fade */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* We handle scrolling inside the container */
            font-family: 'Playfair Display', serif;
        }

        /* 1. Main Container (Handles Snap Scrolling) */
        .invitation-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* The Instagram/Tiktok style snap */
            scroll-behavior: smooth;
        }

        /* 2. Global Background Layer */
        #fixed-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* Placed behind content */
            background-color: black;
        }

        /* Layer for fading between images */
        .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center bottom;
            opacity: 0;
            transition: opacity var(--bg-fade-speed) ease-in-out;
        }

        /* Default visible state for the first image */
        .bg-layer.active {
            opacity: 1;
        }

        /* 3. Section Styling */
        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start; /* Locks section to top */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* Content for Section 1 (Text from Image 0) */
        .intro-text h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 400;
        }
        .intro-text p {
            font-size: 1.5rem;
            margin: 0.5rem 0;
            font-style: italic;
        }

        /* Content for Section 2 (Focus on Gopuram/RSVP) */
        .details h1 {
            font-size: 3rem;
        }
        
        .rsvp-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 15px 40px;
            border: 2px solid gold;
            background-color: rgba(0,0,0,0.4);
            color: gold;
            text-decoration: none;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .rsvp-btn:hover {
            background-color: gold;
            color: black;
        }

    </style>
</head>
<body>

    <div id="fixed-background">
        <div class="bg-layer active" id="bg1" style="background-image: url('img0.jpg');"></div>
        <div class="bg-layer" id="bg2" style="background-image: url('img1.jpg');"></div>
    </div>

    <div class="invitation-scroller">
        
        <section id="section1">
            <div class="intro-text">
                <h1>SARAVANAN</h1>
                <p>WEDS</p>
                <h1>VALLI</h1>
            </div>
        </section>

        <section id="section2">
            <div class="details">
                <h1>Join Our Celebration</h1>
                <p>Date & Venue Details Go Here</p>
                <a href="#" class="rsvp-btn">RSVP Online</a>
            </div>
        </section>

    </div>

    <script>
        // Setup the Intersection Observer to detect section changes
        const scroller = document.querySelector('.invitation-scroller');
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');

        const observerOptions = {
            root: scroller,
            threshold: 0.5 // Trigger when 50% of the section is visible
        };

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    if (entry.target.id === 'section1') {
                        // We are in Section 1 (Intro)
                        bg1.classList.add('active'); // Show Image 0
                        bg2.classList.remove('active'); // Hide Image 1
                    } else if (entry.target.id === 'section2') {
                        // We have scrolled to Section 2
                        bg1.classList.remove('active'); // Hide Image 0
                        bg2.classList.add('active'); // Show Image 1 (Gopuram)
                    }
                }
            });
        }, observerOptions);

        // Tell the observer to watch both sections
        document.querySelectorAll('section').forEach(section => {
            sectionObserver.observe(section);
        });
    </script>
</body>
</html>
