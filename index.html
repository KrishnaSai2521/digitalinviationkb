<!-- UPDATED: Premium + Animated Version -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
/* ADDITIONS ONLY (non-breaking) */

/* Background breathing */
.bg-gradient {
    animation: bgBreath 10s ease-in-out infinite;
}
@keyframes bgBreath {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* Aura rotation */
.divine-aura {
    animation: auraRotate 20s linear infinite, auraPulse 5s ease-in-out infinite;
}
@keyframes auraRotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Gopuram shine gradient */
.gopuram-layer {
    background: linear-gradient(45deg, rgba(255,255,255,0.1), transparent);
}

/* Light sweep stronger */
.light-sweep {
    animation: sweep 6s ease-in-out infinite;
}

/* 3D petals */
.petal {
    transform-style: preserve-3d;
    animation: petalFall3D linear infinite;
}
@keyframes petalFall3D {
    0% {
        transform: translateY(-100px) rotateX(0deg) rotateZ(0deg);
        opacity: 0;
    }
    20% { opacity: 1; }
    100% {
        transform: translateY(100vh) rotateX(360deg) rotateZ(720deg);
        opacity: 0;
    }
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px gold;
    animation: sparkleAnim 2s infinite;
}
@keyframes sparkleAnim {
    0%,100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.5); }
}

/* Name shimmer */
.couple-name {
    position: relative;
    overflow: hidden;
}
.couple-name::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: shimmerMove 4s infinite;
}
@keyframes shimmerMove {
    0% { left: -100%; }
    100% { left: 100%; }
}

</style>
</head>

<body>

<!-- KEEP YOUR ORIGINAL BODY CONTENT UNCHANGED -->

<script>

/* Sparkles generator */
function createSparkles() {
    const count = 40;
    for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = Math.random()*100 + '%';
        s.style.top = Math.random()*100 + '%';
        s.style.animationDelay = Math.random()*2 + 's';
        document.body.appendChild(s);
    }
}

window.addEventListener('DOMContentLoaded', () => {
    createSparkles();
});

</script>

</body>
</html>
