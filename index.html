<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhargavi Lakshmi & Krishna Sai - Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --transition-speed: 1.2s; 
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #a3d2f0; /* Matches the sky color in your image */
            font-family: 'Playfair Display', serif;
        }

        /* 1. Main Container */
        .invitation-scroller {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            position: relative;
            z-index: 2;
        }

        /* 2. Dynamic Background */
        #fixed-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: url('temple.jpg');
            background-size: cover;
            background-position: center 20%; /* Starts focused on the sky */
            transform: scale(1.5); /* Starts zoomed in */
            transition: background-position var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                        transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* This class is triggered by Scroll */
        #fixed-background.revealed {
            background-position: center center; /* Moves down to show temple */
            transform: scale(1); /* Zooms out to fit the screen */
        }

        /* 3. Section Styling */
        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2c3e50; /* Darker color for readability against the sky */
            text-align: center;
        }

        .intro-text h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }

        .intro-text p {
            font-size: 1.8rem;
            margin: 10px 0;
            font-style: italic;
            color: #d48e3d; /* Traditional gold/orange tone */
        }

        .details {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .rsvp-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 15px 40px;
            border: 2px solid #fff;
            background-color: rgba(212, 142, 61, 0.8);
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.3s;
        }

        .rsvp-btn:hover {
            background-color: #fff;
            color: #d48e3d;
        }
    </style>
</head>
<body>

    <div id="fixed-background"></div>

    <div class="invitation-scroller">
        
        <section id="section1">
            <div class="intro-text">
                <h1>Bhargavi Lakshmi</h1>
                <p>WEDS</p>
                <h1>Krishna Sai</h1>
            </div>
        </section>

        <section id="section2">
            <div class="details">
                <h1>Our Wedding</h1>
                <p>12th April 2026</p>
                <p>Save the Date for our special day!</p>
                <a href="#" class="rsvp-btn">RSVP Online</a>
            </div>
        </section>

    </div>

    <script>
        const background = document.getElementById('fixed-background');
        const scroller = document.querySelector('.invitation-scroller');

        const observerOptions = {
            root: scroller,
            threshold: 0.5 
        };

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    if (entry.target.id === 'section2') {
                        background.classList.add('revealed');
                    } else {
                        background.classList.remove('revealed');
                    }
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            sectionObserver.observe(section);
        });
    </script>
</body>
</html>
