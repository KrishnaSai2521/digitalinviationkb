<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Invitation Sample</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 32px;
            text-align: center;
        }
        h1 {
            color: #4a90e2;
        }
        p {
            color: #333;
        }
        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 32px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s;
        }
        .button:hover {
            background: #357ab8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Invited!</h1>
        <p>Join us for a special event. This is a sample digital invitation page.</p>
        <a href="#" class="button">RSVP Now</a>
    </div>
</body>
</html>
